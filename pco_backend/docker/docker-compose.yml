services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pco
    ports:
      - "5432:5432"
    volumes:
      - pco_pg:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ../app:/app/app
      - ../alembic:/app/alembic

volumes:
  pco_pg:
